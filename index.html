/* ---------- RESET ---------- */
*{
margin:0;
padding:0;
box-sizing:border-box;

}

/* ---------- BACKGROUND ---------- */
body{
height:100vh;
display:flex;
justify-content:center;

linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.6)),

/* ---------- GLASS CONTAINER ---------- */

/* TITLE */

/* ---------- BUTTONS ---------- */

padding:14px;
border-radius:40px;

background:rgba(255,255,255,0.25);
transition:.3s;
font-weight:500;
}

/* hover animation */
.link-btn:hover{
background:white;
color:black;
transform:translateY(-4px) scale(1.03);
}

/* FOOTER */
.footer{
margin-top:20px;
font-size:12px;
